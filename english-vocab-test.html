let flat = [];
SECTIONS.forEach(s => s.items.forEach(item => flat.push({...item, section:s.section, type:s.type, hint: s.hint, duration: s.duration})));

let cur = 0;
let answers = flat.map(() => null);
let timerId = null;
let answered = false;
let timerStart = 0;

function n(s){ return String(s).trim().toLowerCase(); }

function speak(word){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US"; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function stopTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }

function startTimer(onTick, onExpire, d){
  stopTimer();
  timerStart = Date.now();
  let v = 2 * d;
  onTick(v);
  timerId = setInterval(()=>{
    v -= 0.1;
    if(v <= 0){ v=0; onTick(0); stopTimer(); onExpire(); }
    else { onTick(v); }
  }, 100);
}

function getElapsed(){ return (Date.now() - timerStart) / 1000; }

function record(i, ua, ok, extra){ answers[i] = {ua, ok, extra}; }

function showFeedback(cls, msg){
  const fb = document.getElementById('fb');
  if(!fb) return;
  fb.className = 'fb ' + cls;
  fb.textContent = msg;
}

function showNext(){
  const area = document.getElementById('next-area');
  if(!area) return;
  area.innerHTML = '';
  const b = document.createElement('button');
  b.className = 'btn btn-p';
  b.textContent = cur+1 >= flat.length ? '結果を見る' : '次の問題へ';
  b.onclick = goNext;
  area.appendChild(b);
}

function goNext() {
  stopTimer();
  cur++;
  if (cur >= flat.length) {
    mode = 'results';
    render();
    return;
  }
  const nextSectionIdx = getSectionIndexForFlatIndex(cur);
  if (nextSectionIdx !== currentSectionIndex) {
    currentSectionIndex = nextSectionIdx;
    mode = 'intro';
    render();
  } else {
    render();
  }
}

function submitText(){
  if(answered) return;
  const inp = document.getElementById('tinput');
  if(!inp) return;
  const val = inp.value;
  if(!val.trim()) return;
  answered = true;
  stopTimer();
  inp.disabled = true;

  const q = flat[cur];
  const accepted = (q.answer || '').split('|').map(a => n(a));
  const ok = accepted.indexOf(n(val)) !== -1;
  record(cur, val, ok, null);

  if(ok){
    showFeedback('ok', '✓ 正解！');
  } else {
    const displayAnswer = q.answer.split('|').join(' / ');
    showFeedback('ng', '✗ 不正解。正解は「' + displayAnswer + '」です。');
  }
  const confBtn = document.getElementById('conf-btn');
  if(confBtn) confBtn.style.display = 'none';
  showNext();
}

function submitPhrase(){
  if(answered) return;
  const inp = document.getElementById('tinput');
  if(!inp) return;
  const val = inp.value;
  if(!val.trim()) return;
  answered = true;
  stopTimer();
  inp.disabled = true;

  const q = flat[cur];
  const accepted = (q.answer || '').split('|').map(a => n(a));
  const ok = accepted.indexOf(n(val)) !== -1;
  const fullAnswer = q.prefix + ' ' + q.answer;
  record(cur, q.prefix + ' ' + val, ok, null);

  if(ok){
    showFeedback('ok', '✓ 正解！');
  } else {
    showFeedback('ng', '✗ 不正解。正解は「' + fullAnswer + '」です。');
  }
  const confBtn = document.getElementById('conf-btn');
  if(confBtn) confBtn.style.display = 'none';
  showNext();
}

function submitRead(){
  if(answered) return;
  answered = true;
  const q = flat[cur];
  record(cur, q.word, true, null);
  goNext();
}
function submitNotRead(){
  if(answered) return;
  answered = true;
  const q = flat[cur];
  record(cur, "-", false, null);
  goNext();
}

function submitChoice(opt, idx){
  if(answered) return;
  answered = true;
  stopTimer();
  const q = flat[cur];
  const elapsed = (q.type === 'timed_choice') ? getElapsed() : null;
  const ok = n(opt) === n(q.answer);

  document.querySelectorAll('.opt').forEach((b) => {
    b.disabled = true;
    if(n(b.dataset.val) === n(q.answer)) b.className = 'opt reveal';
  });
  const chosen = document.getElementById('opt-'+idx);
  if(chosen) chosen.className = 'opt ' + (ok ? 'ok' : 'ng');

  let extra = null;
  if(q.type === 'timed_choice' && elapsed !== null){
    extra = elapsed;
    if(ok){
      if(elapsed <= q.duration){
        showFeedback('ok', '✓ 正解！（' + elapsed.toFixed(1) + '秒）');
      } else {
        showFeedback('warn', '✓ 正解ですが ' + elapsed.toFixed(1) + '秒かかりました。' + q.duration + '秒以内を目指しましょう！');
      }
    } else if(elapsed >= q.duration * 2){
      showFeedback('ng', '✗ 時間切れ。正解は「' + q.answer + '」です。');
    } else {
      showFeedback('ng', '✗ 不正解。（' + elapsed.toFixed(1) + '秒）正解は「' + q.answer + '」です。');
    }
  } else {
    if(ok){ showFeedback('ok', '✓ 正解！'); }
    else { showFeedback('ng', '✗ 不正解。正解は「' + q.answer + '」です。'); }
  }

  record(cur, opt, ok, extra);
  showNext();
}

// flat の定義直後に追加
let currentSectionIndex = 0;
let mode = 'intro'; // 'intro' | 'question' | 'results'

// ヘルパー関数（flat の後に追加）
function getSectionIndexForFlatIndex(idx) {
  let total = 0;
  for (let i = 0; i < SECTIONS.length; i++) {
    total += SECTIONS[i].items.length;
    if (idx < total) return i;
  }
  return SECTIONS.length - 1;
}

function getFirstItemIndexForSection(sectionIdx) {
  let idx = 0;
  for (let i = 0; i < sectionIdx; i++) {
    idx += SECTIONS[i].items.length;
  }
  return idx;
}

// 新規：セクション紹介画面を描画
function renderIntro(sectionIdx) {
  const section = SECTIONS[sectionIdx];
  const totalSections = SECTIONS.length;
  const prog = Math.round((sectionIdx / totalSections) * 100);

  document.getElementById('app').innerHTML = `
    <div class="sec-label">${section.section}</div>
    <div class="card" style="text-align:center;padding:2rem 1rem;">
      <div style="font-size:1.2rem;margin-bottom:1rem;">${section.section}</div>
      <div style="font-size:1rem;color:var(--text-secondary);margin-bottom:2rem;">問題数: ${section.items.length} 問</div>
      <button class="btn btn-p" onclick="startSection()">次へ</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="muted">${sectionIdx+1}/${totalSections}</span>
      <div class="prog-wrap"><div class="prog-fill" style="width:${prog}%"></div></div>
      <span class="muted">${prog}%</span>
    </div>
  `;
}

// 新規：「次へ」ボタンの処理
function startSection() {
  mode = 'question';
  cur = getFirstItemIndexForSection(currentSectionIndex);
  render();
}

function render() {
  if (mode === 'intro') {
    renderIntro(currentSectionIndex);
    return;
  }
  if (mode === 'results') {
    renderResults();
    return;
  }

  answered = false;
  stopTimer();
  const q = flat[cur];
  const total = flat.length;
  const prog = Math.round((cur/total)*100);

  const makeQText = (text, input) => {
    if(!text) return '';
    return text.replace(/\n/g,'<br>').replace(/\[___\]/g, input);
  };

  let body = '';

  if(q.type === 'audio_write'){
    body = `
      <div class="q-sub">🔊 音声を聞いて単語を書いてください。</div>
      <div style="margin-bottom:1rem">
        <button class="snd-btn" onclick="speak('${q.phrase}')">▶ 音声を再生</button>
      </div>
      <div class="q-text">${makeQText(q.q, `<input class="t-input" type="text" id="tinput" placeholder="${(q.hint ? `${q.answer[0]}- ` : "")}" autocomplete="off" autocorrect="off" spellcheck="false">`)}</div>
      <div id="fb"></div>
      <div class="row">
        <button class="btn btn-p" id="conf-btn" onclick="submitText()">確認する</button>
        <div id="next-area"></div>
      </div>`;

  } else if(q.type === 'audio_read'){
    body = `
      <div style="text-align:center;padding:1rem 0">
        <div class="q-sub" style="margin-bottom:1rem">声に出して読んでください。</div>		
        <div style="font-size:36px;font-weight:500;letter-spacing:0.04em;color:var(--text-primary);margin-bottom:0.75rem">${q.word}</div>
		<div style="margin-top:1rem">
        <button class="snd-btn" onclick="speak('${q.word}')">模範発音を聞き、答え合わせをする</button>
		</div>
      </div>
      <div class="row" style="justify-content:center">
        <button class="btn btn-p" onclick="submitRead()">読めた！次へ →</button>
        <button class="btn btn-p" onclick="submitNotRead()">発音が違った…。次へ →</button>
      </div>`;

  } else if(q.type === 'fill_blank'){
    body = `
      <div class="q-text">${makeQText(q.q, `<input class="t-input" type="text" id="tinput" placeholder="${(q.hint ? `${q.answer[0]}- ` : "") + (q.tense ?? "")}" autocomplete="off" autocorrect="off" spellcheck="false">`)}</div>
      
      <div id="fb"></div>
      <div class="row">
        <button class="btn btn-p" id="conf-btn" onclick="submitText()">確認する</button>
        <div id="next-area"></div>
      </div>`;

  } else if(q.type === 'phrase'){
    body = `
      <div class="q-text">${q.q}</div>
      <div class="prefix-row">
        <span class="prefix-label">${q.prefix}</span>
        <input class="t-input" style="flex:1" type="text" id="tinput" placeholder="残りのフレーズを入力..." autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <div id="fb"></div>
      <div class="row">
        <button class="btn btn-p" id="conf-btn" onclick="submitPhrase()">確認する</button>
        <div id="next-area"></div>
      </div>`;

  } else if(q.type === 'choice'){
    const opts = q.options.map((o,i) =>
      `<button class="opt" id="opt-${i}" data-val="${o}" onclick="submitChoice('${o}',${i})">${o}</button>`
    ).join('');
    body = `
      <div class="q-text">${makeQText(q.q, `{<div class="opts">${opts}</div>}`)}</div>
      <div id="fb"></div>
      <div id="next-area" style="margin-top:0.75rem"></div>`;

  } else if(q.type === 'timed_choice'){
    const opts = q.options.map((o,i) =>
      `<button class="opt" id="opt-${i}" data-val="${o}" onclick="submitChoice('${o}',${i})">${o}</button>`
    ).join('');
    body = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:0.75rem">
        <div class="q-text" style="margin:0;flex:1">${makeQText(q.q, `{<div class="opts">${opts}</div>}`)}</div>
        <div class="timer green" id="tmr">${q.duration * 2}</div>
      </div>
      <div class="muted" style="margin-bottom:0.5rem">${q.duration}秒以内に回答してください。</div>
      <div id="fb"></div>
      <div id="next-area" style="margin-top:0.75rem"></div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="sec-label">${q.section}</div>
    <div class="card">
      <div class="muted" style="margin-bottom:10px">問 ${cur+1} / ${total}</div>
      ${body}
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="muted">${cur+1}/${total}</span>
      <div class="prog-wrap"><div class="prog-fill" style="width:${prog}%"></div></div>
      <span class="muted">${prog}%</span>
    </div>`;

  const inp = document.getElementById('tinput');
  if(inp){
    inp.focus();
    if(q.type === 'phrase'){
      inp.addEventListener('keydown', e => { if(e.key==='Enter') submitPhrase(); });
    } else {
      inp.addEventListener('keydown', e => { if(e.key==='Enter') submitText(); });
    }
  }

  if(q.type === 'audio_write') setTimeout(()=>speak(q.word), 400);

  if(q.type === 'timed_choice'){
    setTimeout(()=>{
      startTimer(
        v => {
          const el = document.getElementById('tmr');
          if(el){
            el.textContent = v.toFixed(1);
            if(v > q.duration) el.className = 'timer green';
            else if(v > q.duration / 2) el.className = 'timer warn';
            else el.className = 'timer danger';
          }
        },
        () => {
          if(!answered){
            answered = true;
            record(cur,'（時間切れ）',false, 2*q.duration);
            document.querySelectorAll('.opt').forEach(b => {
              b.disabled = true;
              if(n(b.dataset.val) === n(flat[cur].answer)) b.className = 'opt reveal';
            });
            showFeedback('ng', '✗ 時間切れ。正解は「' + flat[cur].answer + '」です。');
            showNext();
          }
        },
		q.duration
      );
    }, 200);
  }
}

function renderResults(){
  stopTimer();
  const total = flat.length;
  const correctCount = answers.filter(a=>a&&a.ok).length;
  const pct = Math.round(correctCount/total*100);

  let html = `
    <div style="text-align:center;padding:1.5rem 0 0.5rem">
      <div class="score">${correctCount}<span style="font-size:24px;color:var(--text-secondary)"> / ${total}</span></div>
      <div style="color:var(--text-secondary);margin-top:4px;font-size:15px">正答率 ${pct}%</div>
    </div>`;

  let qi = 0;
  SECTIONS.forEach(s => {
    html += `<div class="divider"></div><div class="sec-label" style="margin-bottom:0.5rem">${s.section}</div>`;
    html += `<table class="rtable"><tr><th style="width:34%">問題</th><th style="width:24%">あなたの回答</th><th style="width:22%">正解</th><th>判定</th></tr>`;
    s.items.forEach(item => {
      const a = answers[qi];
      const ua = a ? a.ua : '未回答';
      const ok = a ? a.ok : false;
      const extra = a ? a.extra : null;

      let display = '';
      if(item.q) display = item.q.replace(/\[([^\]]+)\]/g,'[　]').replace(/\n/g,'<br>');
      else if(item.word) display = item.word;

      let correct = '';
      if(item.answer) correct = item.answer.split('|').join(' / ');
      else if(item.word) correct = item.word;
      if(item.prefix) correct = item.prefix + ' ' + correct;

      let badgeClass = ok ? 'ok' : 'ng';
      let badgeText = ok ? '○' : '×';
      let uaDisplay = ua;

      if(s.type === 'timed_choice' && extra !== null){
        const sec = parseFloat(extra).toFixed(1);
        uaDisplay = ua + '（' + sec + '秒）';
        if(ok && extra > s.duration){
          badgeClass = 'warn';
          badgeText = '△';
        }
      }

      html += `<tr>
        <td>${display}</td>
        <td style="color:var(--text-${ok?'success':'danger'})">${uaDisplay}</td>
        <td>${correct}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
      </tr>`;
      qi++;
    });
    html += `</table>`;
  });

  html += `<div style="text-align:center;margin:2rem 0 1rem">
    <button class="btn btn-p" onclick="restart()">もう一度挑戦する</button>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

function restart() {
  cur = 0;
  answers = flat.map(() => null);
  answered = false;
  currentSectionIndex = 0;
  mode = 'intro';
  render();
}

render();
</script>
</body>
</html>
